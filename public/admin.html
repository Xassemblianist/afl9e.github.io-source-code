<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AFL 9/E - XSM-1 Yönetim Düğümü</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');

        :root {
            --bg-color: #030305;
            --card-bg: rgba(15, 15, 20, 0.65);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-blue: #3b82f6;
            --accent-red: #ef4444;
            --accent-green: #10b981;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-color); color: var(--text-main); min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow-x: hidden; padding: 20px; -webkit-font-smoothing: antialiased; }

        .aurora-bg { position: fixed; inset: 0; z-index: -1; background: #020203; overflow: hidden; }
        .aurora-blob { position: absolute; filter: blur(90px); opacity: 0.35; border-radius: 50%; animation: float 15s infinite alternate ease-in-out; will-change: transform; }
        .blob-1 { top: 20%; left: 10%; width: 50vw; height: 50vw; background: radial-gradient(circle, var(--accent-blue), transparent 60%); }
        .blob-2 { bottom: 10%; right: 10%; width: 60vw; height: 60vw; background: radial-gradient(circle, var(--accent-red), transparent 60%); animation-delay: -5s; }
        @keyframes float { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(40px, 40px) scale(1.1); } }

        .glass-panel { background: var(--card-bg); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid var(--card-border); border-top: 1px solid rgba(255,255,255,0.15); border-left: 1px solid rgba(255,255,255,0.15); border-radius: 24px; padding: 40px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6), inset 0 0 20px rgba(255,255,255,0.02); width: 100%; max-width: 450px; transition: opacity 0.5s ease, transform 0.5s ease; }
        
        #dashboard { display: none; max-width: 1000px; padding: 0; background: transparent; border: none; box-shadow: none; backdrop-filter: none; }
        .dash-header { text-align: center; margin-bottom: 40px; }
        .dash-header h1 { font-size: 2rem; font-family: 'JetBrains Mono', monospace; background: linear-gradient(135deg, #fff, #93c5fd); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 700; letter-spacing: -1px; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        .card { background: var(--card-bg); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid var(--card-border); border-radius: 20px; padding: 25px; display: flex; flex-direction: column; }
        .card h2 { font-size: 1.1rem; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 12px; }
        .card h2 span { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }

        input, textarea { width: 100%; padding: 14px; margin-bottom: 15px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white; font-family: 'Inter', sans-serif; font-size: 0.95rem; outline: none; transition: border-color 0.3s, box-shadow 0.3s; }
        input:focus, textarea:focus { border-color: var(--accent-blue); box-shadow: 0 0 15px rgba(59, 130, 246, 0.2); }
        
        button { width: 100%; padding: 14px; border: none; border-radius: 12px; font-weight: 600; font-size: 1rem; color: white; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); background: linear-gradient(135deg, #3b82f6, #2563eb); box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3); }
        button:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(37, 99, 235, 0.4); }
        button.danger { background: linear-gradient(135deg, #ef4444, #dc2626); box-shadow: 0 4px 15px rgba(220, 38, 38, 0.3); }
        button.danger:hover { box-shadow: 0 8px 25px rgba(220, 38, 38, 0.4); }

        .item-list { margin-top: 20px; flex-grow: 1; overflow-y: auto; max-height: 250px; padding-right: 5px; }
        .item-list::-webkit-scrollbar { width: 6px; }
        .item-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.04); border-radius: 12px; margin-bottom: 10px; font-size: 0.9rem; }
        .del-btn { padding: 6px 12px; width: auto; font-size: 0.8rem; margin: 0; box-shadow: none; border-radius: 8px; }

        .terminal { font-family: 'JetBrains Mono', monospace; color: var(--accent-green); font-size: 0.9rem; margin-bottom: 25px; min-height: 80px; display: flex; flex-direction: column; justify-content: flex-end; }
        .term-line { margin-bottom: 5px; opacity: 0; animation: fadeIn 0.3s forwards; }
        @keyframes fadeIn { to { opacity: 1; } }

        .logo-box { text-align: center; margin-bottom: 30px; }
        .logo-box h1 { font-family: 'JetBrains Mono', monospace; font-size: 2rem; letter-spacing: -1px; }
        .logo-box p { color: var(--text-muted); font-size: 0.85rem; margin-top: 5px; }

        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
            .glass-panel { padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <div class="aurora-bg"><div class="aurora-blob blob-1"></div><div class="aurora-blob blob-2"></div></div>

    <div class="glass-panel" id="loginBox">
        <div class="logo-box">
            <h1>XSM-1 GATEWAY</h1>
            <p>AFL 9/E Secure Authentication</p>
        </div>
        
        <div class="terminal" id="terminalArea">
            <div class="term-line" style="color: var(--text-muted);">Bağlantı bekleniyor...</div>
        </div>

        <input type="password" id="adminPass" placeholder="Kriptografik Anahtar (Şifre)" style="text-align: center; letter-spacing: 2px; font-family: 'JetBrains Mono', monospace;">
        <button onclick="startAuth()" id="loginBtn">Oturumu Başlat</button>
    </div>

    <div class="glass-panel" id="dashboard">
        <div class="dash-header">
            <h1>XSM-1 COMMAND NODE</h1>
            <p style="color: var(--text-muted);">Bağlantı Durumu: <span style="color: var(--accent-green);">Güvenli</span> | Modül: Aktif</p>
        </div>
        
        <div class="grid">
            <div class="card">
                <h2><span style="background: var(--accent-blue); box-shadow: 0 0 10px var(--accent-blue);"></span> Veritabanı: Ödev Enjeksiyonu</h2>
                <input type="text" id="subject" placeholder="Ders Modülü (Örn: Matematik)">
                <textarea id="desc" placeholder="Görev Parametreleri (Açıklama)" rows="3"></textarea>
                <input type="text" id="date" placeholder="Zaman Damgası (Örn: Yarın Teslim)">
                <button onclick="addHomework()">Sisteme Enjekte Et</button>
                <div class="item-list" id="hwList"></div>
            </div>

            <div class="card">
                <h2><span style="background: var(--accent-red); box-shadow: 0 0 10px var(--accent-red);"></span> Güvenlik Duvarı: IP Ban</h2>
                <input type="text" id="banIp" placeholder="Engellenecek Hedef IP Adresi" style="font-family: 'JetBrains Mono', monospace;">
                <button onclick="banIp()" class="danger">Ağa Erişimini Kes</button>
                <div class="item-list" id="banList"></div>
            </div>
        </div>
    </div>

    <script>
        let cachedPass = "";

        const terminalLines = [
            "[sys] Kriptografik imza doğrulanıyor...",
            "[net] XSM-1 Ana Veritabanına yönlendiriliyor...",
            "[db] XWM Hava Durumu Düğümü ile el sıkışılıyor...",
            "[auth] Yetki seviyesi: ROOT.",
            "[ok] Erişim Onaylandı."
        ];

        async function startAuth() {
            const passInput = document.getElementById('adminPass');
            if(!passInput.value) return;
            
            cachedPass = passInput.value;
            passInput.style.display = 'none';
            document.getElementById('loginBtn').style.display = 'none';
            
            const termArea = document.getElementById('terminalArea');
            termArea.innerHTML = '';

            for (let i = 0; i < terminalLines.length; i++) {
                await new Promise(r => setTimeout(r, 600));
                const line = document.createElement('div');
                line.className = 'term-line';
                line.innerText = terminalLines[i];
                if(i === terminalLines.length - 1) line.style.color = '#10b981';
                else if (i === 0) line.style.color = '#eab308';
                termArea.appendChild(line);
            }

            setTimeout(() => {
                document.getElementById('loginBox').style.opacity = '0';
                document.getElementById('loginBox').style.transform = 'scale(0.95)';
                setTimeout(() => {
                    document.getElementById('loginBox').style.display = 'none';
                    const dash = document.getElementById('dashboard');
                    dash.style.display = 'block';
                    dash.style.opacity = '0';
                    dash.style.transform = 'scale(1.05)';
                    fetchData();
                    setTimeout(() => {
                        dash.style.transition = 'all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
                        dash.style.opacity = '1';
                        dash.style.transform = 'scale(1)';
                    }, 50);
                }, 500);
            }, 800);
        }

        async function fetchData() {
            try {
                const hwRes = await fetch('/api/homeworks');
                const hwData = await hwRes.json();
                const hwList = document.getElementById('hwList');
                hwList.innerHTML = '';
                hwData.forEach(hw => {
                    hwList.innerHTML += `<div class="item"><span>${hw.subject}</span> <button class="del-btn danger" onclick="delHomework('${hw.id}')">Sil</button></div>`;
                });

                const banRes = await fetch('/api/ban');
                const banData = await banRes.json();
                const banList = document.getElementById('banList');
                banList.innerHTML = '';
                banData.forEach(ip => {
                    banList.innerHTML += `<div class="item"><span style="font-family: monospace;">${ip}</span> <button class="del-btn" style="background: #10b981;" onclick="unbanIp('${ip}')">İzin Ver</button></div>`;
                });
            } catch(e) {}
        }

        async function addHomework() {
            const res = await fetch('/api/homeworks', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: cachedPass, subject: document.getElementById('subject').value, desc: document.getElementById('desc').value, date: document.getElementById('date').value })
            });
            if(res.ok) { document.getElementById('subject').value = ''; document.getElementById('desc').value = ''; document.getElementById('date').value = ''; fetchData(); }
            else alert("Yetkisiz Erişim: Şifre Hatalı!");
        }

        async function delHomework(id) {
            const res = await fetch(`/api/homeworks/${id}`, { method: 'DELETE', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password: cachedPass }) });
            if(res.ok) fetchData(); else alert("Yetkisiz Erişim: Şifre Hatalı!");
        }

        async function banIp() {
            const ip = document.getElementById('banIp').value;
            const res = await fetch('/api/ban', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password: cachedPass, ip }) });
            if(res.ok) { document.getElementById('banIp').value = ''; fetchData(); } else alert("Yetkisiz Erişim: Şifre Hatalı!");
        }

        async function unbanIp(ip) {
            const res = await fetch('/api/unban', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password: cachedPass, ip }) });
            if(res.ok) fetchData(); else alert("Yetkisiz Erişim: Şifre Hatalı!");
        }
    </script>
</body>
</html>
